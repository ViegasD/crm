version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./backend:/app

  celery_worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://evolution:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: evolution-secret-key
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://crm:crm@postgres:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_REDIS_TTL: "604800"
      DEL_INSTANCE: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      CONFIG_SESSION_PHONE_CLIENT: CRM
      CONFIG_SESSION_PHONE_NAME: Chrome
      LANGUAGE: pt-BR
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  evolution_data:
